<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fatma Shooting Studio - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 20px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 800;
      color: white;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #94a3b8; line-height: 1.6; }
    .retry {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">F</div>
    <h1>You're offline</h1>
     <p>Fatma Shooting Studio needs an internet connection to generate fashion photos. We'll reconnect automatically when you're back online.</p>
    <button class="retry" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
