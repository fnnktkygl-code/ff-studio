<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Lady Vampire Studio</title>
    <script>
      // GitHub Pages SPA redirect: stores the full URL in sessionStorage
      // then redirects to index.html which restores the route via history.replaceState
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
