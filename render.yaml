services:
  - type: web
    name: ff-studio
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Enter this manually in the Render dashboard
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: "true"
      - key: GOOGLE_CLOUD_LOCATION
        value: "global"
      - key: GENERATION_MODEL
        value: "gemini-2.5-flash-image"
      - key: MODEL_MIGRATION_FALLBACKS
        value: "gemini-2.5-flash-image-preview"
      - key: VERTEX_MAX_PROMPTS
        value: "2"
      - key: VERTEX_INTER_REQUEST_DELAY_MS
        value: "3000"
